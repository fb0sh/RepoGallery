<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fb0sh's RepoGallery</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%230969da' d='M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z'/%3E%3C/svg%3E" />
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-font-smoothing: antialiased; overflow-x: hidden; width: 100%; }
    body {
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      color: #1f2328;
      background: #ffffff;
      line-height: 1.5;
    }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --color-bg: #ffffff;
      --color-bg-muted: #f6f8fa;
      --color-border: #d0d7de;
      --color-border-hover: #0969da;
      --color-accent: #0969da;
      --color-accent-hover: #0550ae;
      --color-text: #1f2328;
      --color-text-muted: #656d76;
      --color-tag-bg: #ddf4ff;
      --color-tag-text: #0969da;
      --radius-sm: 6px;
      --radius-md: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    }

    /* ── GitHub Corner ──────────────────────────────────────────────────── */
    .gallery-header {
      position: relative;
      text-align: center;
      padding: 24px 24px 20px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
    }
    .github-corner {
      position: absolute;
      top: 0;
      right: 0;
      width: 64px;
      height: 64px;
    }
    .github-corner svg {
      width: 64px;
      height: 64px;
      border: 0;
    }
    .github-corner .octo-arm {
      transform-origin: 130px 106px;
    }
    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }
    @keyframes octocat-wave {
      0%, 100% { transform: rotate(0); }
      20%, 60% { transform: rotate(-25deg); }
      40%, 80% { transform: rotate(10deg); }
    }
    @media (max-width: 500px) {
      .github-corner { width: 40px; height: 40px; }
      .github-corner svg { width: 40px; height: 40px; }
      .github-corner:hover .octo-arm { animation: none; }
      .github-corner .octo-arm { animation: octocat-wave 560ms ease-in-out; }
    }

    /* ── App container ─────────────────────────────────────────────────── */
    #app { min-height: 100vh; display: flex; flex-direction: column; min-width: 0; }

    /* ── Header ─────────────────────────────────────────────────────────── */

    .gallery-title {
      font-size: 28px;
      font-weight: 600;
      color: #1f2328;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .gallery-title a { color: inherit; display: inline-flex; align-items: center; }
    .gallery-title a:hover { text-decoration: none; }
    .gallery-title-user {
      color: inherit !important;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .gallery-title-user:hover {
      color: #0969da !important;
    }
    .gh-icon { color: #1f2328; }
    .gallery-subtitle {
      font-size: 16px;
      color: #656d76;
      margin-top: 4px;
    }

    /* ── Content ─────────────────────────────────────────────────────────── */
    .gallery-content {
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      flex: 1;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .gallery-footer {
      text-align: center;
      padding: 24px;
      color: #656d76;
      font-size: 13px;
      border-top: 1px solid #d0d7de;
      margin-top: auto;
    }

    /* ── Sort bar ─────────────────────────────────────────────────────────── */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
    }
    .sort-label {
      font-size: 12px;
      color: #656d76;
      margin-right: 4px;
      white-space: nowrap;
    }
    .sort-btn {
      padding: 3px 10px;
      font-size: 12px;
      font-family: var(--font-sans);
      color: #1f2328;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .sort-btn:hover { background: #eef1f5; }
    .sort-btn.active {
      background: #0969da;
      border-color: #0969da;
      color: #ffffff;
    }
    .sort-btn.active:hover { background: #0550ae; }
    .order-btn {
      margin-left: auto;
      padding: 3px 10px;
      font-size: 12px;
      font-family: var(--font-sans);
      color: #1f2328;
      background: transparent;
      border: 1px solid #d0d7de;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .order-btn:hover { background: #f3f4f6; border-color: #0969da; }

    @media (max-width: 480px) {
      .sort-bar { flex-wrap: wrap; gap: 4px; padding: 6px 10px; }
      .sort-btn, .order-btn { font-size: 11px; padding: 2px 8px; }
    }

    /* ── Repo grid ───────────────────────────────────────────────────────── */
    .repo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 640px) { .repo-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .repo-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── Loading & error states ──────────────────────────────────────────── */
    .loading, .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 24px;
      color: #656d76;
      font-size: 15px;
    }
    .error-msg { color: #cf222e; }

    /* ── Repo card ───────────────────────────────────────────────────────── */
    .repo-card {
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      background: #ffffff;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .repo-card:hover {
      border-color: #0969da;
      box-shadow: 0 4px 12px rgba(9, 105, 218, 0.08);
      transform: translateY(-1px);
    }

    /* ── Card elements ───────────────────────────────────────────────────── */
    .card-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-name a { color: #0969da; }
    .card-name a::after { content: " ↗"; font-size: 12px; }

    .card-desc {
      font-size: 13px;
      color: #656d76;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-readme {
      font-size: 12px;
      font-style: italic;
      color: #656d76;
      background: #f6f8fa;
      border-left: 3px solid #0969da;
      margin: 0;
      padding: 8px 10px;
      border-radius: 0 4px 4px 0;
      line-height: 1.5;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .card-readme-clickable {
      cursor: pointer;
    }
    .card-readme-clickable:hover {
      background: #eef1f5;
      border-left-color: #0550ae;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #656d76;
    }
    .card-stars { white-space: nowrap; }
    .card-lang { display: flex; align-items: center; gap: 4px; }
    .lang-dot { font-size: 10px; line-height: 1; width: 10px; height: 10px; display: inline-block; }
    .card-updated { white-space: nowrap; }

    .card-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .topic-tag {
      font-size: 11px;
      padding: 2px 8px;
      background: #ddf4ff;
      color: #0969da;
      border-radius: 100px;
      white-space: nowrap;
    }
    .topic-tag:hover {
      background: #b6e0ff;
      text-decoration: none;
    }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 639px) {
      .sort-bar { gap: 4px; padding: 6px 10px; }
      .sort-btn, .order-btn { font-size: 11px; padding: 2px 8px; }
      .gallery-header { padding: 20px 16px 16px; }
      .gallery-title { font-size: 24px; gap: 8px; }
      .gallery-title svg { width: 28px; height: 28px; }
      .gallery-subtitle { font-size: 14px; }
      .gallery-content { padding: 16px; }
      .gallery-footer { padding: 16px; font-size: 12px; }
      .repo-grid { gap: 12px; }
      .loading, .error-msg { padding: 32px 16px; font-size: 14px; }
    }

    @media (max-width: 480px) {
      .gallery-header { padding: 16px 12px 14px; }
      .gallery-title { font-size: 20px; gap: 6px; }
      .gallery-title svg { width: 24px; height: 24px; }
      .gallery-subtitle { font-size: 13px; }
      .gallery-content { padding: 12px; max-width: 100%; }
      .repo-grid { gap: 10px; max-width: 100%; }

      .repo-card { padding: 12px; gap: 6px; word-break: break-word; }
      .card-name { font-size: 14px; }
      .card-name a::after { font-size: 11px; }
      .card-desc { font-size: 12px; -webkit-line-clamp: 3; }
      .card-readme { font-size: 11px; padding: 6px 8px; }
      .card-meta { font-size: 11px; gap: 8px; }
      .topic-tag { font-size: 10px; padding: 2px 6px; }
    }

    /* ── README Modal ───────────────────────────────────────────────────── */
    .readme-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .readme-modal {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 960px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .readme-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #d0d7de;
    }
    .readme-modal-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .readme-modal-title a { color: #0969da; }
    .readme-modal-title a::after { content: " ↗"; font-size: 13px; }
    .readme-modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #656d76;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      border-radius: 4px;
      transition: background 0.15s ease;
    }
    .readme-modal-close:hover { background: #f3f4f6; color: #1f2328; }
    .readme-modal-body {
      overflow-y: auto;
      padding: 20px;
      flex: 1;
    }
    .readme-modal-content {
      font-size: 14px;
      line-height: 1.7;
      color: #1f2328;
      word-wrap: break-word;
    }
    .readme-modal-content h1 { font-size: 20px; margin: 0 0 12px; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    .readme-modal-content h2 { font-size: 18px; margin: 20px 0 8px; border-bottom: 1px solid #d0d7de; padding-bottom: 6px; }
    .readme-modal-content h3 { font-size: 16px; margin: 16px 0 6px; }
    .readme-modal-content h4 { font-size: 14px; margin: 12px 0 4px; }
    .readme-modal-content p { margin: 0 0 12px; }
    .readme-modal-content a { color: #0969da; }
    .readme-modal-content a:hover { text-decoration: underline; }
    .readme-modal-content ul, .readme-modal-content ol { margin: 0 0 12px; padding-left: 24px; }
    .readme-modal-content li { margin-bottom: 4px; }
    .readme-modal-content code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      color: #1f2328;
    }
    .readme-modal-content pre {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 16px;
    }
    .readme-modal-content pre code {
      background: none;
      padding: 0;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre;
    }
    .readme-modal-content img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
    .readme-modal-content blockquote {
      margin: 0 0 12px;
      padding: 8px 16px;
      border-left: 4px solid #d0d7de;
      color: #656d76;
    }
    .readme-modal-content table { width: 100%; border-collapse: collapse; margin: 0 0 16px; }
    .readme-modal-content th, .readme-modal-content td {
      border: 1px solid #d0d7de;
      padding: 8px 12px;
      font-size: 13px;
      text-align: left;
    }
    .readme-modal-content th { background: #f6f8fa; font-weight: 600; }
    .readme-modal-content hr { border: none; border-top: 1px solid #d0d7de; margin: 16px 0; }
    .readme-modal-content strong { font-weight: 600; }
    @media (max-width: 639px) {
      .readme-modal-overlay { padding: 12px; }
      .readme-modal { max-height: 90vh; }
      .readme-modal-header { padding: 12px 16px; }
      .readme-modal-body { padding: 16px; }
      .readme-modal-content { font-size: 13px; }
      .readme-modal-content pre { padding: 12px; }
      .readme-modal-content h1 { font-size: 18px; }
      .readme-modal-content h2 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="dist/bundle.js"></script>
</body>
</html>
