<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoGallery</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%230969da' d='M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z'/%3E%3C/svg%3E" />
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      color: #1f2328;
      background: #ffffff;
      line-height: 1.5;
    }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --color-bg: #ffffff;
      --color-bg-muted: #f6f8fa;
      --color-border: #d0d7de;
      --color-border-hover: #0969da;
      --color-accent: #0969da;
      --color-accent-hover: #0550ae;
      --color-text: #1f2328;
      --color-text-muted: #656d76;
      --color-tag-bg: #ddf4ff;
      --color-tag-text: #0969da;
      --radius-sm: 6px;
      --radius-md: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    }

    /* ── App container ─────────────────────────────────────────────────── */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .gallery-header {
      text-align: center;
      padding: 40px 24px 32px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
    }
    .gallery-title {
      font-size: 28px;
      font-weight: 600;
      color: #1f2328;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .gallery-title a { color: inherit; display: inline-flex; align-items: center; }
    .gallery-title a:hover { text-decoration: none; }
    .gh-icon { color: #1f2328; }
    .gallery-subtitle {
      font-size: 16px;
      color: #656d76;
      margin-top: 4px;
    }

    /* ── Content ─────────────────────────────────────────────────────────── */
    .gallery-content {
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      flex: 1;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .gallery-footer {
      text-align: center;
      padding: 24px;
      color: #656d76;
      font-size: 13px;
      border-top: 1px solid #d0d7de;
      margin-top: auto;
    }

    /* ── Filter bar ──────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .filter-search {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: var(--font-sans);
      color: #1f2328;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .filter-search:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }
    .filter-search::placeholder { color: #8b949e; }

    .filter-languages {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── Language buttons ────────────────────────────────────────────────── */
    .lang-btn {
      padding: 4px 12px;
      font-size: 12px;
      font-family: var(--font-sans);
      color: #1f2328;
      background: transparent;
      border: 1px solid #d0d7de;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .lang-btn:hover { background: #f3f4f6; }
    .lang-btn.active {
      background: #0969da;
      border-color: #0969da;
      color: #ffffff;
    }
    .lang-btn.active:hover { background: #0550ae; border-color: #0550ae; }

    /* ── Repo grid ───────────────────────────────────────────────────────── */
    .repo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 640px) { .repo-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .repo-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── Loading & error states ──────────────────────────────────────────── */
    .loading, .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 24px;
      color: #656d76;
      font-size: 15px;
    }
    .error-msg { color: #cf222e; }

    /* ── Repo card ───────────────────────────────────────────────────────── */
    .repo-card {
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      background: #ffffff;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .repo-card:hover {
      border-color: #0969da;
      box-shadow: 0 4px 12px rgba(9, 105, 218, 0.08);
      transform: translateY(-1px);
    }

    /* ── Card elements ───────────────────────────────────────────────────── */
    .card-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-name a { color: #0969da; }
    .card-name a::after { content: " ↗"; font-size: 12px; }

    .card-desc {
      font-size: 13px;
      color: #656d76;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-readme {
      font-size: 12px;
      font-style: italic;
      color: #656d76;
      background: #f6f8fa;
      border-left: 3px solid #0969da;
      margin: 0;
      padding: 8px 10px;
      border-radius: 0 4px 4px 0;
      line-height: 1.5;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #656d76;
    }
    .card-stars { white-space: nowrap; }
    .card-lang { display: flex; align-items: center; gap: 4px; }
    .lang-dot { font-size: 10px; line-height: 1; width: 10px; height: 10px; display: inline-block; }
    .card-updated { white-space: nowrap; }

    .card-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .topic-tag {
      font-size: 11px;
      padding: 2px 8px;
      background: #ddf4ff;
      color: #0969da;
      border-radius: 100px;
      white-space: nowrap;
    }
    .topic-tag:hover {
      background: #b6e0ff;
      text-decoration: none;
    }

    /* ── Responsive footer spacing ───────────────────────────────────────── */
    @media (max-width: 639px) {
      .gallery-header { padding: 28px 16px 24px; }
      .gallery-title { font-size: 24px; }
      .gallery-content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="dist/bundle.js"></script>
</body>
</html>
