name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # 每天 UTC 04:00 自动刷新各仓库的 star/README 等元数据
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Fetch latest repo data from GitHub API
        run: bash fetch-repos.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - run: npm run build

      - name: Prepare deploy files
        run: |
          mkdir -p _deploy
          cp index.html _deploy/
          cp repos.json _deploy/
          cp -r dist _deploy/
          touch _deploy/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_deploy

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
